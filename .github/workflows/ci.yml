name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ github.sha }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.3.10f1

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.targetPlatform }}-${{ github.sha }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 7

      - name: Comment PR
        uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Build succeeded for \`${{ matrix.targetPlatform }}\`\nArtifact: build-${{ matrix.targetPlatform }}-${{ github.sha }}`
            })

      - name: Notify failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions-cool/maintain-one-comment@v3
        with:
          body: |
            ❌ Build failed for `${{ matrix.targetPlatform }}`
            See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
